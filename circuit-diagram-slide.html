<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Schematic - Thermoelectric Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0b1121;
            --accent-blue: #4facfe;
            --accent-orange: #ff8c42;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* Forced 16:9 Container */
        .slide-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
        }

        /* Circuit Background - Dimmed for Depth */
        .circuit-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
            filter: blur(2px);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Main Content Container */
        .content-container {
            position: relative;
            z-index: 10;
            width: 95%;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 3rem 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 15px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(79, 172, 254, 0.5);
        }

        .diagram-container {
            flex: 1;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 4px solid var(--accent-blue);
            box-shadow: 0 40px 100px rgba(79, 172, 254, 0.3), inset 0 0 60px rgba(79, 172, 254, 0.1);
            margin: 3rem 0;
            padding: 4rem;
            overflow: hidden;
        }

        .circuit-svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Transform Black SVG to Neon Blue */
            filter: invert(72%) sepia(85%) saturate(3015%) hue-rotate(178deg) brightness(110%) contrast(101%) drop-shadow(0 0 15px var(--accent-blue));
            transform: scale(1.1);
        }

        .footer-note {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.6rem 3rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="slide-container">
        <div class="circuit-layer">
            <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
                <g class="blue-glow" stroke="#4facfe" fill="none" stroke-width="1.5">
                    <path d="M850 0 V40 L830 60 V100 L810 120 V180" opacity="0.6" />
                    <path d="M0 260 H60 L80 280 H140" stroke="#ff8c42" opacity="0.6" />
                </g>
            </svg>
        </div>

        <main class="content-container">
            <h1>Circuit Schematic</h1>

            <div class="diagram-container">
                <img src="svg/circuit-diagram.svg" class="circuit-svg" alt="Circuit Diagram">
            </div>

            <div class="footer-note">Complete Hardware Wiring Architecture</div>
        </main>
    </div>

</body>

</html>
