<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Project Visualization - Thermoelectric Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0b1121;
            --accent-blue: #4facfe;
            --accent-orange: #ff8c42;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* Forced 16:9 Container */
        .slide-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
        }

        /* Circuit Background - Dimmed for Depth */
        .circuit-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.2;
            pointer-events: none;
            filter: blur(1px);
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .blue-glow {
            filter: drop-shadow(0 0 4px var(--accent-blue)) drop-shadow(0 0 8px var(--accent-blue));
        }

        .orange-glow {
            filter: drop-shadow(0 0 4px var(--accent-orange)) drop-shadow(0 0 8px var(--accent-orange));
        }

        .trace {
            fill: none;
            stroke-width: 1.2;
            stroke-linecap: round;
        }

        /* Main Content Container */
        .content-container {
            position: relative;
            z-index: 10;
            width: 96%;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 12px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-orange));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(79, 172, 254, 0.4);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2.5rem;
            width: 100%;
            height: 75%;
            padding: 0 4rem;
        }

        .photo-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transition: none;
        }

        .photo-card.blue-theme {
            border: 4px solid var(--accent-blue);
            box-shadow: 0 30px 60px rgba(79, 172, 254, 0.3);
        }

        .photo-card.orange-theme {
            border: 4px solid var(--accent-orange);
            box-shadow: 0 30px 60px rgba(255, 140, 66, 0.3);
        }

        .image-wrapper {
            width: 100%;
            height: 75%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.08);
        }

        .caption {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .footer-note {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.4rem 2.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Subtle Vignette for depth */
        .slide-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="slide-container">
        <div class="circuit-layer">
            <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
                <g class="blue-glow" stroke="#4facfe">
                    <path class="trace" d="M850 0 V40 L830 60 V100 L810 120 V180" opacity="0.8" />
                    <path class="trace" d="M870 0 V40 L890 60 V100 L910 120 V180" opacity="0.8" />
                    <circle class="node" cx="810" cy="120" fill="#fff" />
                    <circle class="node" cx="910" cy="120" fill="#fff" />
                </g>
                <g class="orange-glow" stroke="#ff8c42">
                    <path class="trace" d="M0 260 H60 L80 280 H140" opacity="0.9" />
                    <path class="trace" d="M0 350 H70 L50 370 H120" opacity="0.8" />
                    <circle class="node" cx="80" cy="280" fill="#ff8c42" />
                </g>
            </svg>
        </div>

        <main class="content-container">
            <h1>Project Visualization</h1>

            <div class="photo-grid">
                <div class="photo-card blue-theme">
                    <div class="image-wrapper">
                        <img src="svg/project view 2.jpg" alt="System View">
                    </div>
                    <div class="caption">System View</div>
                </div>

                <div class="photo-card orange-theme">
                    <div class="image-wrapper">
                        <img src="svg/project-setup.jpg" alt="Mobile Charging">
                    </div>
                    <div class="caption">Mobile Charging Active</div>
                </div>

                <div class="photo-card blue-theme">
                    <div class="image-wrapper">
                        <img src="svg/candle-08.png" alt="Candle Test">
                    </div>
                    <div class="caption">Candle Flame (3 Mins)</div>
                </div>

                <div class="photo-card orange-theme">
                    <div class="image-wrapper">
                        <img src="svg/candle_4k.png" alt="Fan Spinning">
                    </div>
                    <div class="caption">Cooling Fan Spins</div>
                </div>
            </div>

            <div class="footer-note">Heat Energy Converting to Electrical Power</div>
        </main>
    </div>

</body>

</html>
