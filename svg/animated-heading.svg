<svg width="1000" height="150" viewBox="0 0 1000 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient for Main Title -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf953f" />
      <stop offset="25%" stop-color="#fcf6ba" />
      <stop offset="50%" stop-color="#b38728" />
      <stop offset="75%" stop-color="#fcf6ba" />
      <stop offset="100%" stop-color="#aa771c" />
      <animate attributeName="x1" from="-100%" to="100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="3s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Platinum Blue Gradient for Subtitle -->
    <linearGradient id="platinumBlueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e5eaf5" />
      <stop offset="25%" stop-color="#a3bcf9" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="75%" stop-color="#a3bcf9" />
      <stop offset="100%" stop-color="#e5eaf5" />
      <animate attributeName="x1" from="-100%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="4s" repeatCount="indefinite" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="transparent" />
  
  <!-- Centered Main Title: Thermoelectric Generator (Gold) -->
  <text x="50%" y="60" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-weight="900" font-size="52" 
        fill="url(#goldGradient)" filter="url(#glow)" 
        style="text-transform: uppercase; letter-spacing: 2px;">
    Thermoelectric Generator
  </text>

  <!-- Centered Subtitle: Electricity From Heat (Platinum Blue) - Smaller & Premium -->
  <text x="50%" y="115" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="24" 
        fill="url(#platinumBlueGradient)" filter="url(#glow)" 
        style="text-transform: uppercase; letter-spacing: 15px; opacity: 0.9;">
    Electricity From Heat
  </text>
</svg>
