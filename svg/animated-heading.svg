<svg width="100%" height="100" viewBox="0 0 1500 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf953f" />
      <stop offset="25%" stop-color="#fcf6ba" />
      <stop offset="50%" stop-color="#b38728" />
      <stop offset="75%" stop-color="#fcf6ba" />
      <stop offset="100%" stop-color="#aa771c" />
      <animate attributeName="x1" from="-100%" to="100%" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="3s" repeatCount="indefinite" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="transparent" />
  
  <!-- Text with marquee-style sliding animation to ensure full visibility -->
  <text y="60%" font-family="'Inter', Arial, sans-serif" font-weight="900" font-size="45" 
        fill="url(#goldGradient)" filter="url(#glow)" 
        style="text-transform: uppercase; letter-spacing: 5px; white-space: nowrap;">
    Thermoelectric Generator
    <animate 
      attributeName="x" 
      values="1500; -800" 
      dur="12s" 
      repeatCount="indefinite" />
  </text>
</svg>
